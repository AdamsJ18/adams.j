<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一文字おみくじ</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #fff9c4 0%, #fce4ec 50%, #e8f5e9 100%);
      font-family: 'Hiragino Maru Gothic ProN', 'Hiragino Maru Gothic Pro', 'BIZ UDGothic', 'Rounded Mplus 1c', sans-serif;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 16px 48px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    .deco {
      font-size: 2.4rem;
      margin-bottom: 10px;
      animation: sway 3s ease-in-out infinite;
    }

    @keyframes sway {
      0%, 100% { transform: rotate(-3deg); }
      50%       { transform: rotate(3deg); }
    }

    h1 {
      font-size: 2.2rem;
      color: #e91e63;
      margin-bottom: 6px;
      text-shadow: 2px 2px 0 rgba(255,255,255,0.85);
      letter-spacing: 0.08em;
    }

    .subtitle {
      font-size: 0.92rem;
      color: #999;
      margin-bottom: 28px;
    }

    /* ---- 入力カード ---- */
    .card {
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 32px 24px 28px;
      box-shadow: 0 8px 32px rgba(233, 30, 99, 0.13);
      margin-bottom: 22px;
    }

    .input-label {
      display: block;
      font-size: 1rem;
      color: #666;
      margin-bottom: 18px;
    }

    .char-input {
      width: 110px;
      height: 110px;
      font-size: 3.2rem;
      text-align: center;
      border: 3px solid #f48fb1;
      border-radius: 22px;
      outline: none;
      color: #e91e63;
      background: #fff;
      display: block;
      margin: 0 auto 24px;
      transition: border-color 0.25s, box-shadow 0.25s;
      caret-color: #e91e63;
    }

    .char-input:focus {
      border-color: #e91e63;
      box-shadow: 0 0 0 5px rgba(233, 30, 99, 0.14);
    }

    .draw-btn {
      width: 100%;
      padding: 18px;
      font-size: 1.25rem;
      background: linear-gradient(135deg, #f48fb1 0%, #e91e63 100%);
      color: #fff;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 5px 18px rgba(233, 30, 99, 0.38);
      letter-spacing: 0.12em;
      transition: transform 0.18s, box-shadow 0.18s;
      -webkit-tap-highlight-color: transparent;
    }

    .draw-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(233, 30, 99, 0.48);
    }

    .draw-btn:active {
      transform: translateY(1px);
      box-shadow: 0 3px 10px rgba(233, 30, 99, 0.3);
    }

    .error-msg {
      color: #e91e63;
      font-size: 0.88rem;
      margin-top: 14px;
      display: none;
      background: #fff0f5;
      border-radius: 12px;
      padding: 10px 14px;
    }

    /* ---- 結果カード ---- */
    .result-card {
      background: linear-gradient(135deg, #fff8e1 0%, #fce4ec 100%);
      border-radius: 26px;
      padding: 30px 24px 26px;
      box-shadow: 0 10px 36px rgba(0, 0, 0, 0.11);
      display: none;
    }

    .result-card.show {
      display: block;
      animation: popIn 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      0%   { opacity: 0; transform: scale(0.85) translateY(18px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .result-label {
      font-size: 0.85rem;
      color: #bbb;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .result-char {
      display: block;
      font-size: 5rem;
      color: #e91e63;
      line-height: 1.1;
      margin-bottom: 4px;
      text-shadow: 3px 3px 0 rgba(233,30,99,0.15);
    }

    .result-stars {
      font-size: 1.6rem;
      margin-bottom: 18px;
      animation: sparkle 1.5s ease-in-out infinite alternate;
    }

    @keyframes sparkle {
      from { filter: brightness(1); }
      to   { filter: brightness(1.4) drop-shadow(0 0 6px #ffb300); }
    }

    .result-message {
      font-size: 1.12rem;
      color: #444;
      line-height: 1.9;
      background: rgba(255,255,255,0.75);
      border-radius: 18px;
      padding: 20px 18px;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.04);
      text-align: left;
    }

    .result-date {
      font-size: 0.78rem;
      color: #ccc;
      margin-top: 14px;
    }

    .try-again {
      display: inline-block;
      margin-top: 18px;
      padding: 12px 28px;
      background: rgba(255,255,255,0.7);
      color: #e91e63;
      border: 2px solid #f48fb1;
      border-radius: 50px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .try-again:hover {
      background: rgba(255,255,255,1);
    }
  </style>
</head>
<body>
<div class="container">
  <div class="deco">🌸</div>
  <h1>一文字おみくじ</h1>
  <p class="subtitle">「あ」〜「ん」のひらがなを一文字入れてね<br><span style="font-size: 0.9em; color: #ff69b4; font-weight: bold;">『引くだけで必ず幸せな気分になれるおみくじ』</span></p>

  <div class="card">
    <label class="input-label" for="charInput">ひらがな一文字を入力してください</label>
    <input
      type="text"
      id="charInput"
      class="char-input"
      maxlength="2"
      placeholder="あ"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
    >
    <button class="draw-btn" onclick="drawOmikuji()">✨ おみくじをひく ✨</button>
    <p class="error-msg" id="errorMsg">「あ」〜「ん」のひらがな一文字を入力してください</p>
  </div>

  <div class="result-card" id="resultCard">
    <p class="result-label">今日のひと言運勢</p>
    <span class="result-char" id="resultChar"></span>
    <div class="result-stars">⭐️⭐️⭐️</div>
    <div class="result-message" id="resultMessage"></div>
    <p class="result-date" id="resultDate"></p>
    <button class="try-again" onclick="scrollToInput()">もう一度ひく 🔄</button>
  </div>
</div>

  // 年の何日目かを返す（日付でメッセージを切り替える）
  function getDayOfYear() {
    const now = new Date();
    const start = new Date(now.getFullYear(), 0, 0);
    return Math.floor((now - start) / (1000 * 60 * 60 * 24));
  }

  // ひらがな1文字に正規化（濁点・半角なども考慮）
  function normalize(str) {
    // maxlength=2 でも入力されることがあるので最初の1文字だけ使う
    return str.trim().charAt(0);
  }

  function drawOmikuji() {
    const raw   = document.getElementById('charInput').value;
    const char  = normalize(raw);
    const error = document.getElementById('errorMsg');
    const card  = document.getElementById('resultCard');

    if (!omikuji[char]) {
      error.style.display = 'block';
      card.classList.remove('show');
      return;
    }

    error.style.display = 'none';

    const messages = omikuji[char];
    const idx      = getDayOfYear() % messages.length;

    document.getElementById('resultChar').textContent    = char;
    document.getElementById('resultMessage').textContent = messages[idx];

    const now = new Date();
    document.getElementById('resultDate').textContent =
      `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日のおみくじ`;

    // アニメーション再生
    card.classList.remove('show');
    void card.offsetWidth;          // リフロー強制
    card.classList.add('show');

    // 結果へスクロール
    setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
  }

  function scrollToInput() {
    document.getElementById('charInput').focus();
    document.getElementById('charInput').scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  // Enterキーでもひける
  document.getElementById('charInput').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') drawOmikuji();
  });

  // 入力中はエラーを消す
  document.getElementById('charInput').addEventListener('input', function () {
    document.getElementById('errorMsg').style.display = 'none';
  });
